spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379


cors:
  urls:
    - http://localhost:8080
    - http://localhost:3000
    - http://localhost:5173

  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE

jwt:
  secret: ${JWT_SECRET}
  time:
    access-token: 3600000
    refresh-token: 10000000

beginner:
  api:
    payload:
      discord:
        scope:
          - Exception
        web-hook-url: ${DISCORD_WEBHOOK_URL}
        enable: false

