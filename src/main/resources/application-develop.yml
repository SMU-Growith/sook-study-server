spring:
  config:
    activate:
      on-profile: develop
  datasource:
    url: ${DEV_DB_URL}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      ssl:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  time:
    access-token: 3600000
    refresh-token: 10000000

cors:
  urls:
    - http://localhost:8080
    - http://localhost:3000
    - http://localhost:5173
    - https://growith.cloud
    - https://api.growith.cloud

  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE

beginner:
  api:
    payload:
      discord:
        scope:
          - Exception
        web-hook-url: ${DISCORD_WEBHOOK_URL}
        enable: true
